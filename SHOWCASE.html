<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 PAYTM AI MERCHANT COPILOT | 3D NEURAL SHOWCASE</title>
    <!-- Google Fonts & Font Awesome -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            cursor: crosshair;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
        }

        .overlay {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 4rem 2rem;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
        }

        .header {
            text-align: center;
            pointer-events: auto;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            background: linear-gradient(to right, #00fbff, #b129ff, #002e6e, #00fbff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            filter: drop-shadow(0 0 30px rgba(0, 251, 255, 0.4));
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .sub-header {
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: #00fbff;
            opacity: 0.9;
            margin-top: 1rem;
            text-transform: uppercase;
            font-weight: 800;
            background: rgba(0, 251, 255, 0.1);
            padding: 0.5rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }

        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            opacity: 0.6;
            transition: 0.4s;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 2px;
            z-index: 20;
        }

        .back-link:hover {
            opacity: 1;
            color: #00fbff;
            transform: translateX(-5px);
        }

        .info-panel {
            position: fixed;
            bottom: 4rem;
            width: 600px;
            padding: 2.5rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 251, 255, 0.2);
            border-radius: 32px;
            text-align: center;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
        }

        .info-panel.active {
            opacity: 1;
            transform: translateY(0);
        }

        .info-panel h2 {
            font-family: 'Orbitron', sans-serif;
            color: #00fbff;
            margin-bottom: 1rem;
            letter-spacing: 4px;
        }

        .info-panel p {
            font-size: 1rem;
            line-height: 1.6;
            color: #94a3b8;
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s cubic-bezier(1, 0, 0, 1);
        }

        .status-text {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 6px;
            font-size: 1rem;
            margin-bottom: 2rem;
            color: #00fbff;
        }

        .loader-bar-wrap {
            width: 300px;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: #00fbff;
            box-shadow: 0 0 20px #00fbff;
        }

        .controls-hint {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 3px;
        }

        /* 3D Labels */
        .label {
            position: absolute;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 0 0 10px #00fbff;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
    </style>
</head>

<body>
    <div class="loading-screen" id="loader">
        <div class="status-text" id="status">MAPPING NEURAL TOPOLOGY...</div>
        <div class="loader-bar-wrap">
            <div class="loader-progress" id="progress"></div>
        </div>
    </div>

    <a href="README.md" class="back-link"><i class="fas fa-arrow-left"></i> RETURN TO REPO</a>

    <div id="canvas-container"></div>

    <div class="overlay">
        <div class="header">
            <h1>SYSTEM TOPOLOGY</h1>
            <div class="sub-header">CLICK ANY LAYER TO EXPLORE</div>
        </div>

        <div class="info-panel" id="info-panel">
            <h2 id="info-title">LAYER SELECTED</h2>
            <p id="info-desc">Detailed architectural specifications will appear here.</p>
        </div>

        <div class="controls-hint">DRAG TO ROTATE | CLICK TO INTERROGATE</div>
    </div>

    <div id="labels-container"></div>

    <script>
        // Three.js Core
        let scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 20, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Architecture Configuration
        const archData = [
            { id: "visual", name: "Visual Layer", sub: "React 18 + Framer Motion", color: 0x00fbff, y: 16, size: [18, 0.4, 18], desc: "The primary interaction hub utilizing high-fidelity glassmorphism and real-time state synchronization for a premium POS experience." },
            { id: "neural", name: "Neural Gateway", sub: "FastAPI + Secure Mesh", color: 0xb129ff, y: 5, size: [14, 0.4, 14], desc: "An asynchronous orchestration layer managing encrypted payloads and routing neural requests to specialized vision and logic models." },
            { id: "intel", name: "Intelligence Matrix", sub: "OpenAI + Vision Engine", color: 0x2563eb, y: -6, size: [12, 0.4, 12], desc: "The analytical core performing autonomous product auditing, growth trajectory mapping, and predictive inventory optimization." },
            { id: "ledger", name: "Persistent Ledger", sub: "Merchant Stock Repository", color: 0x1e293b, y: -18, size: [20, 1.2, 20], desc: "An immutable, secure repository for all transactional logic and stock history, ensuring data integrity and merchant liquidity." }
        ];

        const archGroup = new THREE.Group();
        scene.add(archGroup);

        const layerMeshes = [];
        const labels = [];

        archData.forEach((data, i) => {
            // Layer Mesh
            const geo = new THREE.BoxGeometry(...data.size);
            const mat = new THREE.MeshPhongMaterial({
                color: data.color, transparent: true, opacity: 0.1,
                shininess: 100, emissive: data.color, emissiveIntensity: 0.3
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = data.y;
            mesh.userData = data;
            archGroup.add(mesh);

            // Inner Core Glow
            const coreGeo = new THREE.BoxGeometry(data.size[0] * 0.9, 0.1, data.size[2] * 0.9);
            const coreMat = new THREE.MeshBasicMaterial({ color: data.color, transparent: true, opacity: 0.2 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            mesh.add(core);

            // Wireframe
            const wireGeo = new THREE.EdgesGeometry(geo);
            const wireMat = new THREE.LineBasicMaterial({ color: data.color, transparent: true, opacity: 0.5 });
            const wire = new THREE.LineSegments(wireGeo, wireMat);
            mesh.add(wire);

            layerMeshes.push(mesh);

            // HTML Label Element
            const labelDiv = document.createElement('div');
            labelDiv.className = 'label';
            labelDiv.innerHTML = `<i class="fas fa-microchip"></i> ${data.name.toUpperCase()}`;
            document.getElementById('labels-container').appendChild(labelDiv);
            labels.push({ div: labelDiv, pos: new THREE.Vector3(data.size[0] / 2 + 2, data.y, 0) });
        });

        // Neural Connecting Fibers
        const fibers = new THREE.Group();
        archGroup.add(fibers);
        for (let i = 0; i < 60; i++) {
            const x = (Math.random() - 0.5) * 12;
            const z = (Math.random() - 0.5) * 12;
            const points = [
                new THREE.Vector3(x, 16, z),
                new THREE.Vector3(x * 0.7, 5, z * 0.7),
                new THREE.Vector3(x * 0.5, -6, z * 0.5),
                new THREE.Vector3(x * 0.9, -18, z * 0.9)
            ];
            const curve = new THREE.CatmullRomCurve3(points);
            const fiberGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(50));
            const fiberMat = new THREE.LineBasicMaterial({ color: 0x00fbff, transparent: true, opacity: 0.15 });
            const fiber = new THREE.Line(fiberGeo, fiberMat);
            fibers.add(fiber);
        }

        // Lighting
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const pLight = new THREE.PointLight(0x00fbff, 1, 100);
        pLight.position.set(20, 20, 20);
        scene.add(pLight);

        // Raycasting for Interactivity
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(layerMeshes);

            if (intersects.length > 0) {
                const layer = intersects[0].object;
                const data = layer.userData;

                // Animate info panel
                const panel = document.getElementById('info-panel');
                document.getElementById('info-title').innerText = data.name;
                document.getElementById('info-desc').innerText = data.desc;
                panel.classList.add('active');

                // Visual Feedback
                gsap.to(layer.scale, { x: 1.1, y: 1.1, z: 1.1, duration: 0.3, yoyo: true, repeat: 1 });
                gsap.to(layer.material, { opacity: 0.6, duration: 0.3, yoyo: true, repeat: 1 });

                // Focus Camera
                gsap.to(camera.position, { x: 25, y: data.y + 10, z: 40, duration: 1.5, ease: "power2.inOut" });
            } else {
                document.getElementById('info-panel').classList.remove('active');
                gsap.to(camera.position, { x: 30, y: 20, z: 50, duration: 1.5 });
            }
        });

        // Animation Loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;

            archGroup.rotation.y += 0.0015;

            // Floating animation
            layerMeshes.forEach((mesh, i) => {
                mesh.position.y = archData[i].y + Math.sin(time + i) * 0.4;

                // Update Label Position
                const labelPos = labels[i].pos.clone();
                labelPos.applyMatrix4(archGroup.matrixWorld);
                labelPos.project(camera);

                const x = (labelPos.x * 0.5 + 0.5) * window.innerWidth;
                const y = (labelPos.y * -0.5 + 0.5) * window.innerHeight;
                labels[i].div.style.left = `${x}px`;
                labels[i].div.style.top = `${y}px`;
                labels[i].div.style.opacity = 0.8;
            });

            renderer.render(scene, camera);
        }
        animate();

        // Mouse Drag Interaction
        let isDragging = false;
        let prevMouseX = 0;
        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - prevMouseX;
                archGroup.rotation.y += deltaX * 0.01;
            }
            prevMouseX = e.clientX;
        });

        // Loader logic
        let progress = 0;
        const fakeLoad = setInterval(() => {
            progress += Math.random() * 12;
            if (progress >= 100) {
                progress = 100;
                clearInterval(fakeLoad);
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 1200);
                }, 500);
            }
            document.getElementById('progress').style.width = progress + '%';
        }, 120);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
